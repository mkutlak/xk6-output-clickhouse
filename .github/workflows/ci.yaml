# Job graph:
#   validate (reusable) ──┐
#     ├─ lint              │
#     └─ test              ├── (all must pass)
#   build-check ──────────┘
#   integration-tests ────┘
name: CI

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'pkg/**'
      - 'register.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yaml'
      - '.github/workflows/validate.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Code Validation
    uses: ./.github/workflows/validate.yaml

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install xk6
        run: |
          XK6_VERSION=$(cat .xk6-version 2>/dev/null || echo latest)
          go install go.k6.io/xk6/cmd/xk6@${XK6_VERSION}

      - name: Build k6 with extension
        run: |
          MODULE_NAME=$(go list -m)
          GOPRIVATE="go.k6.io/k6" xk6 build \
            --output ./k6ext \
            --with "${MODULE_NAME}=."

      - name: Verify binary
        run: |
          ./k6ext version
          file ./k6ext

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run integration tests
        env:
          CLICKHOUSE_VERSION: 25.12-alpine
          HEALTHCHECK_INTERVAL: 3s
        run: make docker-ci
        timeout-minutes: 10

      - name: Collect Docker logs
        if: failure()
        run: docker compose logs > docker-logs.txt

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-logs
          path: docker-logs.txt
          retention-days: 3

      - name: Clean up Docker Compose
        if: always()
        run: make docker-compose-down || true
